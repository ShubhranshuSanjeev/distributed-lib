syntax = "proto3";

package raft.state;

import "raft/common/common.proto";

message PersistentState {
    uint64 current_term = 1;
    uint64 voted_for = 2;
    repeated raft.common.LogEntry log = 3;
}

message ServerState {
    uint64 current_term = 1;
    uint64 voted_for = 2;
    repeated raft.common.LogEntry log = 3;
    uint64 commit_index = 4;
    uint64 last_applied = 5;
}

message LeaderState {
    map<uint64, uint64> next_index = 1;
    map<uint64, uint64> match_index = 2;
}
